{% extends 'base.html' %}
{% block content %}
<h2 class='mb-4'>Back to Work Notification</h2>
<div class='card mb-4'>
  <div class='card-header'>Send Notification</div>
  <div class='card-body'>
    <form method='post'>{% csrf_token %}
      <div class='mb-3'>
        <label class='form-label fw-bold'>Full Name</label>
        <input name='full_name' class='form-control'
          value='{{ request.user.first_name }} {{ request.user.last_name }}' required>
      </div>
      <div class='mb-3'>
        <label class='form-label fw-bold'>Date of Return</label>
        <input type='date' name='return_date' class='form-control' required>
      </div>
      <div class='mb-3'>
        <label class='form-label fw-bold'>Message (optional)</label>
        <textarea name='message' class='form-control' rows='3'
          placeholder='e.g. Returning from sick leave'></textarea>
      </div>
      <button type='submit' class='btn btn-primary'>
        <i class='fas fa-paper-plane me-1'></i> Send Notification
      </button>
    </form>
  </div>
</div>
<div class='card'>
  <div class='card-header'>History</div>
  <div class='card-body'>
    <table class='table table-hover'>
      <thead><tr>
        <th>Name</th><th>Return Date</th><th>Sent</th>
      </tr></thead>
      <tbody>
        {% for r in history %}
        <tr>
<td>{{ r.full_name }}</td>
<td>{{ r.return_date }}</td>
<td><small class='text-muted'>{{ r.sent_at|date:'d/m/Y H:i' }}</small></td>
</tr>
{% empty %}
<tr><td colspan='3' class='text-center text-muted'>No notifications sent yet.</td></tr>
{% endfor %}
</tbody>
</table>
</div>
</div>
{% endblock %}
